<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Oc.exe</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") no-repeat center center fixed;
    background-size: cover;
    color: white;
}

/* FEJLÉC */
header {
    text-align: center;
    padding-top: 50px;
}

#title {
    font-size: 100px;
    transition: 0.2s;
    text-shadow: 2px 2px 5px black;
}

/* MENÜ */
nav {
    margin-top: 30px;
}

nav a {
    display: inline-block;
    margin: 20px;
    font-size: 30px;
    color: white;
    text-decoration: none;
    -webkit-text-stroke: 1px black;
    transition: 0.3s;
}

/* HULLÁM */
.wave {
    animation: wave 2s infinite ease-in-out;
}

@keyframes wave {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

/* DÜLÖNGÉLÉS */
.wave:hover {
    animation: wobble 0.5s infinite;
}

@keyframes wobble {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(5deg); }
    50% { transform: rotate(-5deg); }
    75% { transform: rotate(5deg); }
    100% { transform: rotate(0deg); }
}

/* SZÍNEK */
.odin:hover { color: yellow; }
.front:hover { color: black; }
.angel:hover { color: darkblue; }
</style>

</head>

<body>

<header>
    <h1 id="title">Oc.exe</h1>

    <nav>
        <a href="odin.html" class="wave odin">Odin Rifle</a>
        <a href="#" class="wave front">Frontside Tartuffe</a>
        <a href="#" class="wave angel">Ángel Xavier</a>
    </nav>
</header>

<script>
window.addEventListener("scroll", function() {
    let title = document.getElementById("title");
    let size = Math.max(40, 100 - window.scrollY / 2);
    title.style.fontSize = size + "px";
});
</script>

</body>
</html>
